services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - ./app:/app/app        # hot reload
      - uploads_data:/tmp/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: uploaddb
    ports:
      - "5433:5432"           # exposed for local DB tools (TablePlus etc.)
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d uploaddb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  pg_data: